<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>量子のふたご — Quantum Pair</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', system-ui, sans-serif;
    background: radial-gradient(circle at 50% -10%, #1b2440, #0a0e1a 70%);
    color: #e8eefc;
    overflow: hidden;
    touch-action: manipulation;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 12px 12px max(12px, env(safe-area-inset-bottom));
  }
  header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: 1.05rem;
    letter-spacing: 0.04em;
    font-weight: 800;
    background: linear-gradient(90deg, #6ad6ff, #b48bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header .sub { font-size: 0.66rem; color: #8593b8; margin-top: 2px; }
  .topbar { display: flex; gap: 8px; align-items: center; }
  .pill {
    font-size: 0.72rem; padding: 4px 10px; border-radius: 99px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #cdd7f5; white-space: nowrap;
  }
  .rule-banner {
    width: 100%; max-width: 560px;
    text-align: center; font-size: 0.78rem; font-weight: 700;
    color: #ffd76a; margin-bottom: 8px; min-height: 1.2em;
    letter-spacing: 0.02em;
  }
  .board-wrap {
    position: relative;
    width: 100%; max-width: 560px;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 60px rgba(80,120,255,0.05);
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: rgba(8,12,24,0.82); backdrop-filter: blur(4px);
    gap: 14px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay h2 { font-size: 1.5rem; font-weight: 800; }
  .overlay p { font-size: 0.85rem; color: #aab6da; line-height: 1.6; max-width: 380px; }
  .btn {
    border: none; cursor: pointer; font-weight: 800; font-size: 0.9rem;
    padding: 12px 26px; border-radius: 12px; color: #07101f;
    background: linear-gradient(90deg, #6ad6ff, #b48bff);
    box-shadow: 0 8px 24px rgba(106,214,255,0.3);
    transition: transform 0.08s;
  }
  .btn:active { transform: scale(0.96); }
  .btn.ghost {
    background: rgba(255,255,255,0.07); color: #cdd7f5;
    border: 1px solid rgba(255,255,255,0.15); box-shadow: none;
  }
  .controls {
    margin-top: 12px; display: grid; gap: 8px;
    grid-template-columns: repeat(3, 58px);
    grid-template-rows: repeat(3, 58px);
    justify-content: center;
  }
  .dbtn {
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    border-radius: 12px; color: #cdd7f5; font-size: 1.4rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .dbtn:active { background: rgba(106,214,255,0.25); }
  .dbtn.spacer { visibility: hidden; }
  .footer-actions { margin-top: 10px; display: flex; gap: 8px; }
  .hint { font-size: 0.68rem; color: #6f7ba0; margin-top: 8px; text-align: center; }
  .moves-flash { color: #6ad6ff; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>量子のふたご</h1>
      <div class="sub">Quantum Pair — ひとつの操作で、ふたつの宿命</div>
    </div>
    <div class="topbar">
      <span class="pill" id="levelPill">面 1</span>
      <span class="pill" id="movePill">手数 0</span>
    </div>
  </header>

  <div class="rule-banner" id="ruleBanner"></div>

  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle"></h2>
      <p id="ovText"></p>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn" id="ovBtn"></button>
        <button class="btn ghost" id="ovBtn2" style="display:none;"></button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="dbtn spacer"></div>
    <div class="dbtn" data-dir="up">▲</div>
    <div class="dbtn spacer"></div>
    <div class="dbtn" data-dir="left">◀</div>
    <div class="dbtn spacer"></div>
    <div class="dbtn" data-dir="right">▶</div>
    <div class="dbtn spacer"></div>
    <div class="dbtn" data-dir="down">▼</div>
    <div class="dbtn spacer"></div>
  </div>

  <div class="footer-actions">
    <button class="btn ghost" id="undoBtn" style="padding:8px 18px; font-size:0.78rem;">⟲ もどす</button>
    <button class="btn ghost" id="resetBtn" style="padding:8px 18px; font-size:0.78rem;">↺ やり直し</button>
  </div>
  <div class="hint">矢印キー / WASD / 画面ボタン で操作 ・ Z でもどす ・ R でやり直し</div>
</div>

<script>
"use strict";
/* =========================================================================
   量子のふたご — Quantum Pair
   ひとつの入力で「青の駒」と「橙の駒」が同時に動く。
   ただし橙の駒は、その面の「対称ルール」に従って動く。
     mirrorX : 左右反転（青が右なら橙は左）
     mirrorY : 上下反転
     point   : 点対称（左右も上下も反転）
     rotate  : 90度回転（青が上なら橙は右…）
     same    : 完全同期（チュートリアル用）
   両方の駒を同時に各自のゴールへ。壁(#)には進めない。
   ========================================================================= */

const DIRS = {
  up:    { x: 0, y: -1 },
  down:  { x: 0, y: 1 },
  left:  { x: -1, y: 0 },
  right: { x: 1, y: 0 },
};

// ルールごとの、青の移動方向 → 橙の移動方向 変換
const RULE_TRANSFORM = {
  same:    v => ({ x: v.x,  y: v.y  }),
  mirrorX: v => ({ x: -v.x, y: v.y  }),
  mirrorY: v => ({ x: v.x,  y: -v.y }),
  point:   v => ({ x: -v.x, y: -v.y }),
  rotate:  v => ({ x: -v.y, y: v.x  }), // 時計回り90°
};

const RULE_LABEL = {
  same:    "完全同期 — ふたごは同じ向きに動く",
  mirrorX: "左右ミラー — 橙は左右が逆になる",
  mirrorY: "上下ミラー — 橙は上下が逆になる",
  point:   "点対称 — 橙は上下も左右も逆になる",
  rotate:  "90°回転 — 橙は青を時計回りに90°ひねった向きに動く",
};

/* グリッド凡例:
   '#' 壁  '.' 床
   'A' 青の駒スタート   'a' 青のゴール
   'B' 橙の駒スタート   'b' 橙のゴール        */
const LEVELS = [
  {
    rule: "same",
    grid: [
      "#########",
      "#A......#",
      "#.###.#.#",
      "#...#.#.#",
      "#.#.#.#.#",
      "#.#...#a#",
      "#.#####.#",
      "#B.....b#",
      "#########",
    ],
  },
  {
    rule: "mirrorX",
    grid: [
      "#########",
      "#A.....B#",
      "#.#####.#",
      "#.#...#.#",
      "#.#.#.#.#",
      "#...#...#",
      "#.#####.#",
      "#a.....b#",
      "#########",
    ],
  },
  {
    rule: "mirrorY",
    grid: [
      "#########",
      "#A.....a#",
      "#.#.#.#.#",
      "#.#...#.#",
      "#...#...#",
      "#.#...#.#",
      "#.#.#.#.#",
      "#B.....b#",
      "#########",
    ],
  },
  {
    rule: "mirrorX",
    grid: [
      "#########",
      "#A.#.#.B#",
      "#.....#.#",
      "#.###...#",
      "#.#.#.#.#",
      "#...#.#.#",
      "#.#...#.#",
      "#a.#.#.b#",
      "#########",
    ],
  },
  {
    rule: "point",
    grid: [
      "#########",
      "#..#....#",
      "#b....A.#",
      "#..B..#.#",
      "#a.#..#.#",
      "#.#...###",
      "#.......#",
      "#.....#.#",
      "#########",
    ],
  },
  {
    rule: "rotate",
    grid: [
      "#########",
      "##......#",
      "#.......#",
      "#b...####",
      "#.#.#.#.#",
      "#A...a#.#",
      "#..#.B#.#",
      "#..#..###",
      "#########",
    ],
  },
  {
    rule: "point",
    grid: [
      "#########",
      "##.###.##",
      "#.#..#..#",
      "#.#.#.#.#",
      "#.......#",
      "#.B.##..#",
      "#A####a.#",
      "#.#....b#",
      "#########",
    ],
  },
  {
    rule: "rotate",
    grid: [
      "#########",
      "#####..##",
      "#.....#.#",
      "#..#..#.#",
      "#...#...#",
      "#.....B.#",
      "#b.#....#",
      "#A.##..a#",
      "#########",
    ],
  },
];

// ---- 状態 ----
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let level = 0;
let state = null;     // { wallSet, blue:{x,y}, orange:{x,y}, goalBlue, goalOrange, rule }
let history = [];     // undo 用
let moves = 0;
let cols = 9, rows = 9;
let animating = false;

const ui = {
  levelPill: document.getElementById("levelPill"),
  movePill:  document.getElementById("movePill"),
  ruleBanner:document.getElementById("ruleBanner"),
  overlay:   document.getElementById("overlay"),
  ovTitle:   document.getElementById("ovTitle"),
  ovText:    document.getElementById("ovText"),
  ovBtn:     document.getElementById("ovBtn"),
  ovBtn2:    document.getElementById("ovBtn2"),
};

function parseLevel(def) {
  const grid = def.grid;
  rows = grid.length;
  cols = grid[0].length;
  const wall = new Set();
  let blue, orange, goalBlue, goalOrange;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const ch = grid[y][x];
      if (ch === "#") wall.add(x + "," + y);
      else if (ch === "A") blue = { x, y };
      else if (ch === "B") orange = { x, y };
      else if (ch === "a") goalBlue = { x, y };
      else if (ch === "b") goalOrange = { x, y };
    }
  }
  return {
    wall,
    blue, orange,
    goalBlue, goalOrange,
    rule: def.rule,
  };
}

function loadLevel(i) {
  level = i;
  state = parseLevel(LEVELS[i]);
  history = [];
  moves = 0;
  animating = false;
  ui.levelPill.textContent = "面 " + (i + 1) + " / " + LEVELS.length;
  ui.movePill.textContent = "手数 0";
  ui.ruleBanner.textContent = "◆ " + RULE_LABEL[state.rule];
  hideOverlay();
  resize();
}

function isWall(x, y) {
  if (x < 0 || y < 0 || x >= cols || y >= rows) return true;
  return state.wall.has(x + "," + y);
}

function tryMove(dir) {
  if (animating || !state) return;
  const v = DIRS[dir];
  const tv = RULE_TRANSFORM[state.rule](v);

  const onGoalBlue = atGoal(state.blue, state.goalBlue);
  const onGoalOrange = atGoal(state.orange, state.goalOrange);

  // ゴール済みの駒は固定（パズルとして解きやすくする）
  const nb = onGoalBlue ? { ...state.blue } : nextPos(state.blue, v);
  const no = onGoalOrange ? { ...state.orange } : nextPos(state.orange, tv);

  const movedBlue = nb.x !== state.blue.x || nb.y !== state.blue.y;
  const movedOrange = no.x !== state.orange.x || no.y !== state.orange.y;
  if (!movedBlue && !movedOrange) return; // どちらも壁で動けない

  history.push({ blue: { ...state.blue }, orange: { ...state.orange }, moves });
  state.blue = nb;
  state.orange = no;
  moves++;
  ui.movePill.textContent = "手数 " + moves;
  flashMove();
  draw();

  if (atGoal(state.blue, state.goalBlue) && atGoal(state.orange, state.goalOrange)) {
    setTimeout(winLevel, 220);
  }
}

function nextPos(p, v) {
  const x = p.x + v.x, y = p.y + v.y;
  if (isWall(x, y)) return { ...p };
  return { x, y };
}

function atGoal(p, g) { return p.x === g.x && p.y === g.y; }

function undo() {
  if (animating || history.length === 0) return;
  const prev = history.pop();
  state.blue = prev.blue;
  state.orange = prev.orange;
  moves = prev.moves;
  ui.movePill.textContent = "手数 " + moves;
  draw();
}

function flashMove() {
  ui.movePill.classList.add("moves-flash");
  setTimeout(() => ui.movePill.classList.remove("moves-flash"), 120);
}

// ---- 描画 ----
function resize() {
  const wrap = canvas.parentElement;
  const size = wrap.clientWidth;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function draw() {
  if (!state) return;
  const size = canvas.parentElement.clientWidth;
  const cell = size / cols;
  ctx.clearRect(0, 0, size, size);

  // 床のグリッド
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (state.wall.has(x + "," + y)) {
        ctx.fillStyle = "#202b4d";
        roundRect(x * cell + 1, y * cell + 1, cell - 2, cell - 2, cell * 0.18);
        ctx.fill();
        ctx.fillStyle = "rgba(120,150,255,0.08)";
        roundRect(x * cell + 1, y * cell + 1, cell - 2, cell * 0.28, cell * 0.18);
        ctx.fill();
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.025)";
        roundRect(x * cell + 2, y * cell + 2, cell - 4, cell - 4, cell * 0.14);
        ctx.fill();
      }
    }
  }

  // ゴール
  drawGoal(state.goalBlue, cell, "#6ad6ff");
  drawGoal(state.goalOrange, cell, "#ff9f5a");

  // 駒
  drawToken(state.orange, cell, "#ff9f5a", "#ffcaa0", atGoal(state.orange, state.goalOrange));
  drawToken(state.blue, cell, "#6ad6ff", "#bfeeff", atGoal(state.blue, state.goalBlue));
}

function drawGoal(g, cell, color) {
  const cx = g.x * cell + cell / 2;
  const cy = g.y * cell + cell / 2;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.9;
  ctx.lineWidth = Math.max(2, cell * 0.06);
  ctx.beginPath();
  ctx.arc(cx, cy, cell * 0.3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, cell * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawToken(p, cell, color, glow, onGoal) {
  const cx = p.x * cell + cell / 2;
  const cy = p.y * cell + cell / 2;
  const r = cell * 0.32;
  ctx.save();
  // glow
  const grd = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r * 1.8);
  grd.addColorStop(0, color);
  grd.addColorStop(1, "rgba(0,0,0,0)");
  ctx.globalAlpha = onGoal ? 0.55 : 0.32;
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  // highlight
  ctx.fillStyle = glow;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.arc(cx - r * 0.3, cy - r * 0.3, r * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---- オーバーレイ ----
function showOverlay(title, text, btnLabel, btnFn, btn2Label, btn2Fn) {
  ui.ovTitle.textContent = title;
  ui.ovText.innerHTML = text;
  ui.ovBtn.textContent = btnLabel;
  ui.ovBtn.onclick = btnFn;
  if (btn2Label) {
    ui.ovBtn2.style.display = "";
    ui.ovBtn2.textContent = btn2Label;
    ui.ovBtn2.onclick = btn2Fn;
  } else {
    ui.ovBtn2.style.display = "none";
  }
  ui.overlay.classList.add("show");
}
function hideOverlay() { ui.overlay.classList.remove("show"); }

function winLevel() {
  if (level + 1 < LEVELS.length) {
    showOverlay(
      "クリア！",
      `手数 <b>${moves}</b> で両方をゴールへ導いた。<br>次の面では対称ルールが変わるかも。`,
      "次の面へ ▶", () => loadLevel(level + 1)
    );
  } else {
    showOverlay(
      "全クリア 🎉",
      `すべての宿命を重ね合わせた。<br>君は量子のもつれを解きほぐした。`,
      "もう一度", () => loadLevel(0)
    );
  }
}

// ---- 入力 ----
const keyMap = {
  ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
  w: "up", s: "down", a: "left", d: "right",
  W: "up", S: "down", A: "left", D: "right",
};
window.addEventListener("keydown", (e) => {
  if (keyMap[e.key]) { e.preventDefault(); tryMove(keyMap[e.key]); }
  else if (e.key === "z" || e.key === "Z") undo();
  else if (e.key === "r" || e.key === "R") loadLevel(level);
});

document.querySelectorAll(".dbtn[data-dir]").forEach(btn => {
  btn.addEventListener("click", () => tryMove(btn.dataset.dir));
});
document.getElementById("undoBtn").onclick = undo;
document.getElementById("resetBtn").onclick = () => loadLevel(level);

// スワイプ操作
let touchStart = null;
canvas.addEventListener("touchstart", (e) => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener("touchend", (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? "right" : "left");
  else tryMove(dy > 0 ? "down" : "up");
}, { passive: true });

window.addEventListener("resize", resize);

// ---- タイトル → ゲーム開始 ----
function start() {
  loadLevel(0);
  showOverlay(
    "量子のふたご",
    "ひとつの操作で <span style='color:#6ad6ff'>青</span> と <span style='color:#ff9f5a'>橙</span> の駒が同時に動く。<br>" +
    "ただし橙は、その面の<b>対称ルール</b>に従って逆向きや回転で動く。<br>" +
    "両方を同時に各自のゴールへ。<br><br>" +
    "矢印キー / WASD / スワイプ で操作。",
    "はじめる ▶", () => hideOverlay()
  );
}
start();
</script>
</body>
</html>
