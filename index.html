<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理学 キーワード120 問題アプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f4f8;
  color: #2d3748;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #c0392b, #e74c3c);
  color: white;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
header h1 { font-size: 1.1rem; font-weight: 700; }
header .subtitle { font-size: 0.72rem; opacity: 0.85; margin-top: 2px; }
.progress-bar-wrap { background: rgba(255,255,255,0.3); border-radius: 99px; height: 8px; width: 140px; overflow: hidden; }
.progress-bar { background: #ffd700; height: 100%; border-radius: 99px; transition: width 0.4s; }
.progress-text { font-size: 0.7rem; opacity: 0.9; text-align: right; margin-top: 3px; }

.controls {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 12px 24px; background: white;
  border-bottom: 1px solid #e2e8f0; align-items: center;
}
.controls label { font-size: 0.8rem; color: #718096; font-weight: 600; }
select, button {
  padding: 6px 12px; border-radius: 6px; font-size: 0.82rem;
  cursor: pointer; border: 1px solid #cbd5e0; background: white; color: #2d3748;
}
.btn-primary { background: #c0392b; color: white; border: none; font-weight: 600; }
.btn-primary:hover { background: #a93226; }
.btn-danger { background: #718096; color: white; border: none; font-weight: 600; }
.btn-danger:hover { background: #4a5568; }

.stats-row {
  display: flex; gap: 10px; padding: 8px 24px;
  background: #fafafa; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap;
}
.stat-badge {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px; font-size: 0.76rem; font-weight: 600;
}
.stat-badge.perfect { background: #c6f6d5; color: #276749; }
.stat-badge.good    { background: #bee3f8; color: #2a69ac; }
.stat-badge.half    { background: #fefcbf; color: #975a16; }
.stat-badge.miss    { background: #fed7d7; color: #9b2c2c; }
.stat-badge.total   { background: #e9d8fd; color: #553c9a; }

.tab-buttons {
  display: flex; border-bottom: 2px solid #e2e8f0; padding: 0 24px; background: white;
}
.tab-btn {
  padding: 9px 18px; border: none; background: none; cursor: pointer;
  font-size: 0.85rem; font-weight: 600; color: #718096;
  border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s;
}
.tab-btn.active { color: #c0392b; border-bottom-color: #c0392b; }

.main { max-width: 660px; margin: 0 auto; padding: 28px 20px; display: flex; flex-direction: column; gap: 18px; }

.question-card {
  background: white; border-radius: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.09);
  border-top: 5px solid #c0392b; padding: 28px;
}
.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.q-no { font-size: 0.72rem; color: #a0aec0; font-weight: 700; letter-spacing: 1px; }
.q-chapter {
  background: #fff5f5; color: #c0392b;
  font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px;
}
.q-area { background: #ebf4ff; color: #2b6cb0; font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
.q-term { font-size: 1.5rem; font-weight: 800; color: #1a202c; line-height: 1.4; margin-bottom: 6px; }
.q-instruction { font-size: 0.78rem; color: #718096; margin-bottom: 16px; }

.answer-area {
  width: 100%; min-height: 120px; padding: 12px 14px;
  border: 2px solid #cbd5e0; border-radius: 8px;
  font-size: 0.9rem; font-family: inherit; resize: vertical;
  transition: border-color 0.2s; line-height: 1.6; color: #2d3748;
}
.answer-area:focus { outline: none; border-color: #c0392b; }
.answer-area:disabled { background: #f7fafc; color: #718096; }
.char-counter {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px; margin-bottom: 2px;
}
.char-count-num {
  font-size: 1rem; font-weight: 800;
  transition: color 0.2s;
}
.char-count-num.under  { color: #718096; }
.char-count-num.ok     { color: #276749; }
.char-count-num.over   { color: #c0392b; }
.char-count-bar-wrap {
  flex: 1; height: 6px; background: #e2e8f0;
  border-radius: 99px; margin: 0 10px; overflow: hidden;
}
.char-count-bar {
  height: 100%; border-radius: 99px; transition: width 0.2s, background 0.2s;
}
.char-count-label {
  font-size: 0.72rem; color: #718096; white-space: nowrap;
}
.char-count-hint {
  font-size: 0.75rem; font-weight: 600; text-align: right;
  margin-top: 2px; min-height: 1.2em; transition: color 0.2s;
}
.char-count-hint.under { color: #718096; }
.char-count-hint.ok    { color: #276749; }
.char-count-hint.over  { color: #c0392b; }

.btn-check {
  width: 100%; padding: 13px; background: #c0392b; color: white;
  border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s; margin-top: 10px;
}
.btn-check:hover { background: #a93226; }
.btn-check:disabled { background: #a0aec0; cursor: default; }

.prev-answer {
  display: none; background: #fffbeb;
  border: 1.5px solid #f6e05e; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
}
.prev-answer.show { display: block; }
.prev-answer-label { font-size: 0.78rem; font-weight: 700; color: #b7791f; margin-bottom: 6px; letter-spacing: 0.03em; }
.prev-answer-text { font-size: 0.88rem; color: #744210; line-height: 1.7; white-space: pre-wrap; }

.model-answer {
  display: none; background: #f0fff4;
  border: 2px solid #9ae6b4; border-radius: 10px; padding: 18px; margin-top: 14px;
}
.model-answer.show { display: block; }
.model-label { font-size: 0.72rem; font-weight: 700; color: #276749; letter-spacing: 1px; margin-bottom: 8px; }
.model-main { font-size: 1rem; font-weight: 700; color: #1a202c; margin-bottom: 6px; line-height: 1.5; }
.model-sub { font-size: 0.82rem; color: #4a5568; line-height: 1.7; }

.judge-section { display: none; margin-top: 16px; }
.judge-section.show { display: block; }
.judge-label { font-size: 0.8rem; color: #4a5568; font-weight: 600; margin-bottom: 10px; text-align: center; }
.judge-buttons { display: flex; gap: 10px; }
.judge-btn {
  flex: 1; padding: 12px 6px; border-radius: 10px; border: 2px solid transparent;
  font-size: 0.82rem; font-weight: 700; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.15s;
}
.judge-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
.judge-btn.selected { border-color: #2d3748 !important; transform: scale(1.04); }
.judge-btn .icon { font-size: 1.3rem; }
.judge-btn .lbl { font-size: 0.68rem; }
.j-perfect { background: #c6f6d5; color: #276749; }
.j-good    { background: #bee3f8; color: #2a69ac; }
.j-half    { background: #fefcbf; color: #975a16; }
.j-miss    { background: #fed7d7; color: #9b2c2c; }

.nav-buttons { display: flex; gap: 10px; justify-content: center; }
.nav-btn {
  padding: 10px 22px; border-radius: 8px; border: 1px solid #cbd5e0;
  background: white; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
}
.nav-btn:hover { background: #edf2f7; }
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.nav-btn.next { background: #c0392b; color: white; border-color: #c0392b; }
.nav-btn.next:hover:not(:disabled) { background: #a93226; }

.complete-screen {
  display: none; flex-direction: column; align-items: center;
  gap: 18px; padding: 50px 24px; text-align: center;
}
.complete-screen.active { display: flex; }
.complete-emoji { font-size: 4rem; }
.complete-title { font-size: 1.6rem; font-weight: 700; }
.complete-sub { color: #718096; font-size: 0.9rem; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 340px; margin: 8px 0; }
.result-item { border-radius: 10px; padding: 14px; font-weight: 700; text-align: center; }
.result-item .count { font-size: 1.8rem; }
.result-item .name { font-size: 0.72rem; margin-top: 3px; }

.list-view { display: none; max-width: 760px; margin: 0 auto; padding: 20px 24px; }
.list-view.active { display: block; }
.list-table {
  width: 100%; border-collapse: collapse; font-size: 0.8rem;
  background: white; border-radius: 10px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.list-table th { background: #c0392b; color: white; padding: 10px 10px; text-align: left; font-weight: 700; }
.list-table td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; }
.list-table tr:last-child td { border-bottom: none; }
.list-table tr:hover td { background: #f7fafc; }
.score-chip { padding: 2px 7px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; display: inline-block; }
.sc-perfect { background: #c6f6d5; color: #276749; }
.sc-good    { background: #bee3f8; color: #2a69ac; }
.sc-half    { background: #fefcbf; color: #975a16; }
.sc-miss    { background: #fed7d7; color: #9b2c2c; }
.sc-none    { background: #edf2f7; color: #a0aec0; }
.ch-tag { background: #fff5f5; color: #c0392b; font-size: 0.68rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }


.judge-label-manual { font-size: 0.75rem; color: #718096; margin-bottom: 8px; text-align: center; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📚 鉄則10＆キーワード120 問題アプリ 第2版</h1>
    <div class="subtitle">公認心理師・臨床心理士 試験対策</div>
  </div>
  <div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>
</header>

<div class="controls">
  <label>章：</label>
  <select id="filterChapter"><option value="all">すべて</option></select>
  <label>順序：</label>
  <select id="filterOrder">
    <option value="seq">番号順</option>
    <option value="shuffle">シャッフル</option>
    <option value="miss">未習得優先</option>
  </select>
  <button class="btn-primary" onclick="startQuiz()">▶ スタート</button>
  <button class="btn-danger" onclick="resetScores()">🗑 リセット</button>
</div>

<div class="stats-row">
  <div class="stat-badge total">📚 対象: <span id="stTotal">0</span>語</div>
  <div class="stat-badge perfect">◎ <span id="stPerfect">0</span></div>
  <div class="stat-badge good">○ <span id="stGood">0</span></div>
  <div class="stat-badge half">△ <span id="stHalf">0</span></div>
  <div class="stat-badge miss">✗ <span id="stMiss">0</span></div>
</div>

<div class="tab-buttons">
  <button class="tab-btn active" id="tabQuiz" onclick="switchTab('quiz')">📝 問題</button>
  <button class="tab-btn" id="tabList" onclick="switchTab('list')">📋 進捗一覧</button>
</div>

<div id="quizView">
  <div class="main" id="mainArea">
    <div class="question-card">
      <div class="q-meta">
        <span class="q-no" id="cardNo">No.1  1/120</span>
        <span class="q-chapter" id="cardChapter">第1章</span>
        <span class="q-area" id="cardArea">原理・研究法</span>
      </div>
      <div class="q-term" id="cardTerm">用語</div>
      <div class="q-instruction">👇 この用語の意味・概要を <strong>160〜200字</strong> で説明してください（100字記述の練習）</div>
      <!-- 前回の回答 -->
      <div class="prev-answer" id="prevAnswer">
        <div class="prev-answer-label">📝 前回の回答</div>
        <div class="prev-answer-text" id="prevAnswerText"></div>
      </div>
      <textarea class="answer-area" id="userAnswer" placeholder="ここに説明を入力…160〜200字を目安に（空欄のまま「答えを見る」も可）" oninput="updateCharCount()"></textarea>
      <div class="char-counter">
        <span class="char-count-num under" id="charNum">0</span>
        <div class="char-count-bar-wrap">
          <div class="char-count-bar" id="charBar" style="width:0%;background:#cbd5e0;"></div>
        </div>
        <span class="char-count-label">160〜200字</span>
      </div>
      <div class="char-count-hint under" id="charHint">あと 160 字</div>
      <button class="btn-check" id="btnCheck" onclick="showAnswer()">答えを見る・採点する</button>
      <!-- 模範解答 -->
      <div class="model-answer" id="modelAnswer">
        <div class="model-label">📖 模範解答</div>
        <div class="model-main" id="modelMain" style="font-size:0.92rem;font-weight:500;line-height:1.8;"></div>
      </div>
      <div class="judge-section" id="judgeSection">
        <div class="judge-label-manual" id="judgeLabel">自己採点で上書きできます：</div>
        <div class="judge-buttons">
          <button class="judge-btn j-perfect" onclick="judge('perfect')" id="j-perfect"><span class="icon">◎</span><span class="lbl">完璧</span></button>
          <button class="judge-btn j-good"    onclick="judge('good')"    id="j-good"   ><span class="icon">○</span><span class="lbl">理解OK</span></button>
          <button class="judge-btn j-half"    onclick="judge('half')"    id="j-half"   ><span class="icon">△</span><span class="lbl">半分</span></button>
          <button class="judge-btn j-miss"    onclick="judge('miss')"    id="j-miss"   ><span class="icon">✗</span><span class="lbl">未習得</span></button>
        </div>
      </div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" id="btnPrev" onclick="prevCard()">← 前へ</button>
      <button class="nav-btn" id="btnSkip" onclick="skipCard()">スキップ</button>
      <button class="nav-btn next" id="btnNext" onclick="nextCard()" disabled>次へ →</button>
    </div>
  </div>

  <div class="complete-screen" id="completeScreen">
    <div class="complete-emoji">🎉</div>
    <div class="complete-title">セッション完了！</div>
    <div class="complete-sub" id="completeSubText"></div>
    <div class="result-grid" id="resultGrid"></div>
    <button class="btn-primary" style="padding:12px 32px;font-size:1rem;" onclick="startQuiz()">もう一度挑戦</button>
  </div>
</div>

<div class="list-view" id="listView">
  <table class="list-table">
    <thead><tr><th>No.</th><th>章</th><th>用語</th><th>理解度</th></tr></thead>
    <tbody id="listBody"></tbody>
  </table>
</div>

const DESC = {
  1:{t:"精神物理学（心理物理学）とは物理的刺激の強度と心理的感覚量の関係を数量的に研究する学問領域で、ウェーバーの法則（差異閾は基準刺激の大きさに比例）とフェヒナーの法則（感覚量は刺激強度の対数に比例）が基本原理である。絶対閾・弁別閾の概念も重要であり、心理学を科学として確立する礎となった学問領域として心理学史上重要な位置を占める。"},
  2:{t:"要素主義は意識を基本的な感覚・感情の要素に分解して理解しようとする立場で、ヴントやティチェナーが内省法を用いて体系化した。主観性が高く再現性に問題があると批判され、後にゲシュタルト心理学の「全体は部分の総和以上」という主張や行動主義による意識排除への反発が高まり、現代心理学の発展に多大な影響を与えた歴史的に重要な理論的立場である。"},
  3:{t:"行動主義は観察可能な行動のみを心理学の研究対象とする立場で、ワトソンが「心理学は行動の科学である」と宣言して創始した。内省や意識の研究を否定しS-R連合を基本単位とし、スキナーがその後継者としてオペラント条件づけを体系化した。現在の認知行動療法の基盤となる学習理論の多くがこの立場から発展した歴史的に重要な理論的立場である。"},
  4:{t:"ゲシュタルト心理学は「全体は部分の総和以上」という命題のもと、知覚や思考を全体的まとまりとして理解する立場である。ヴェルトハイマー・ケーラー・コフカが創始し、近接・類似・閉合・連続などの知覚体制化原理（プレグナンツの法則）を提唱した。洞察学習や認知心理学の発展にも大きな影響を与えた理論体系として心理学史において重要な位置を占めている。"},
  5:{t:"精神分析学はフロイトが創始した理論体系で、無意識の動機や葛藤が人間の行動に根本的影響を与えるとする。局所論（意識・前意識・無意識）から構造論（エス・自我・超自我）へと発展した。リビドー概念・夢分析・自由連想法を確立し、心理療法と臨床心理学の発展に多大な影響を与えた歴史的に重要な理論体系として現代心理学の基盤に大きく貢献している。"},
  6:{t:"母集団は研究対象全体の集合、標本はそこから抽出した一部であり、無作為抽出によって代表性を確保することで標本統計量から母数を推定できる。標本誤差はサンプルサイズが大きいほど小さくなり、研究の外的妥当性（一般化可能性）を支える基本的概念として位置づけられる。研究法と統計的推測の根幹をなす極めて重要な基礎的概念として広く用いられている。"},
  7:{t:"実験群は独立変数の操作を行う群、対照群は操作を行わない比較用の群であり、両者の比較によって独立変数の因果的効果を推定する。剰余変数を統制するにはランダム割り付けが有効で内的妥当性を確保できる。プラセボ効果や期待効果を防ぐために二重盲検法が用いられることもある実験的研究における重要な基本的設計概念として研究法の学習において不可欠である。"},
  8:{t:"縦断研究は同一の個人を長期追跡し個人内変化を測定する研究デザインで、横断研究は異なる年齢層を同時期に比較する。縦断研究は練習効果・脱落バイアスが問題となり、横断研究はコホート効果（世代差）が結果を歪める可能性がある。両者を組み合わせた継列デザイン（シーケンシャル研究）が発達心理学では特に有効とされている重要な研究デザイン論の概念である。"},
  9:{t:"信頼性は測定の一貫性・安定性を指し、同じ対象を同じ方法で繰り返し測定したときに同じ結果が得られる程度のことである。再検査信頼性・内的整合性（クロンバックα係数）・評定者間信頼性が主な種類として知られる。信頼性は妥当性の必要条件であり、信頼性が低ければ妥当性も保証されない点が心理測定の基本原則として重要な位置を占めている。"},
  10:{t:"妥当性は測定しようとする概念を正確に測れているかの程度を指す。内容的妥当性・基準関連妥当性（併存的・予測的）・構成概念妥当性の三種が主要な種類であり、構成概念妥当性は因子分析や既知グループ比較で検討される。信頼性が高くても妥当性が低い検査は意味をなさず、心理測定において両者の確保が不可欠な基本原則として広く理解されている。"},
  11:{t:"レスポンデント条件づけはパブロフが犬の実験で発見した学習様式であり、中性刺激が無条件刺激と繰り返し対提示されることで中性刺激だけで条件反応が引き起こされるようになる現象である。古典的条件づけとも呼ばれ、消去・自発的回復・刺激般化・刺激弁別が基本概念であり、恐怖反応の獲得やフラッシュバックなど臨床的に重要な現象の説明に用いられる。"},
  12:{t:"オペラント条件づけはスキナーが体系化した学習理論で、行動の直後の結果によって行動頻度が変化する現象である。正・負の強化は行動を増加させ、正・負の罰は減少させる。変動比率スケジュールが最も消去されにくく、ギャンブル行動の持続の説明にも応用される。行動分析の基礎として認知行動療法や応用行動分析（ABA）に広く活用されている重要な概念である。"},
  13:{t:"モデリングはバンデューラが提唱した社会的学習理論の核心概念であり、他者の行動を観察・模倣することで直接強化なしに学習が成立する観察学習を指す。ボボ人形実験で攻撃行動の模倣が示され、代理強化も学習を促進する。注意・保持・運動再生・動機づけの四過程が必要とされ、自己効力感の概念とも密接に関連する社会的学習の重要理論である。"},
  14:{t:"学習性無力感はセリグマンが提唱した概念で、制御不能な嫌悪刺激への繰り返し暴露によって実際には回避可能な場面でも無力感を示す状態が学習される現象である。電気ショックを回避できない犬の実験で示された。無力感・認知の歪み・動機づけ低下の三側面を持ち、うつ病の認知モデルや心理療法への応用において重要な理論的基盤を提供している。"},
  15:{t:"試行錯誤学習はソーンダイクが提唱した概念で、偶然の成功が繰り返されることで行動パターンが形成される学習様式であり効果の法則が基本原理である。一方、洞察学習はケーラーのチンパンジー実験で示された問題の全体構造を突然把握する非連続的な学習様式である。両者は漸進的学習と突発的学習として対比され、学習研究における古典的な理論的対比をなしている。"},
  16:{t:"知覚の恒常性とは観察条件（距離・角度・照明など）が変化しても対象の大きさ・形・明るさ・色などが一定に知覚される現象である。大きさの恒常性では遠くの物体が実際の網膜像より大きく知覚される。過去の経験やトップダウン処理（期待・文脈）が関与しており、知覚の能動的・構成的性質を示す重要な現象として知覚心理学の基礎に位置づけられている。"},
  17:{t:"スキーマは過去の経験から形成された知識の枠組みであり、新たな情報の解釈・記憶・判断に影響を与える。バートレットの記憶変容研究では文化的スキーマに沿って記憶が再構成されることが示された。ピアジェは認知発達においてスキーマへの同化と調節の相互作用を重視し、認知行動療法では機能不全的スキーマが精神的問題の維持に寄与し治療の標的となる。"},
  18:{t:"プライミングは先行刺激（プライム）が後続刺激の処理や判断に無意識的に影響を与える現象である。知覚的プライミングと概念的プライミングがあり、潜在記憶の一形態として意識的な想起を伴わないため健忘患者でも保持される。反応時間の短縮として測定されることが多く、自動的情報処理やステレオタイプの活性化の研究にも広く応用されている基本的な認知現象である。"},
  19:{t:"メタ認知はフラベルが提唱した概念で、自分自身の認知過程を認識し監視・制御する能力のことである。メタ認知的知識（認知の特徴についての知識）とメタ認知的活動（実際の監視・制御）に分けられる。学習場面では自分の理解度の把握・学習方略の選択・進捗のモニタリングとして機能し、メタ認知能力が高い学習者は効果的な学習ができるとされている。"},
  20:{t:"記憶の3過程とは符号化（取り込み）・貯蔵（保持）・検索（引き出し）の三段階から成るモデルである。アトキンソンとシフリンの多重貯蔵モデルは感覚記憶→短期記憶→長期記憶という流れを想定する。各過程での失敗が忘却の原因となり、符号化の深さ（処理水準説）や精緻化リハーサルの重要性とともに記憶研究の基盤となっている重要な概念枠組みである。"},
  21:{t:"短期記憶は情報を数秒〜数十秒保持するシステムで容量は7±2チャンクとされる（ミラーの魔法の数）。バデリーはこれを作動記憶として再定義し、音韻ループ・視空間スケッチパッド・エピソードバッファ・中央実行系の四成分を想定した。推論・言語理解・学習など高次認知機能の基盤として機能し、認知症や学習困難の評価においても活用される重要な記憶システムである。"},
  22:{t:"長期記憶は容量・保持期間に実質的制限のない記憶システムである。宣言的記憶（エピソード記憶・意味記憶）と非宣言的記憶（手続き記憶・プライミング・条件づけ）に大別される。顕在記憶と潜在記憶の区別も重要であり、海馬が新しいエピソード記憶の形成に関与し損傷では前向性健忘が生じることが神経心理学的証拠から広く知られている記憶システムである。"},
  23:{t:"系列位置効果は単語リスト記憶でリスト先頭部分（初頭効果）と末尾部分（新近効果）の項目が中間より記憶されやすい現象である。初頭効果は先頭項目が長期記憶に転送されることで、新近効果は末尾項目が短期記憶に残存することで生じると説明される。マードックの自由再生実験で実証され、二重貯蔵モデルを支持する重要な証拠として引用されている。"},
  24:{t:"忘却とは記憶が時間経過や干渉によって想起できなくなる現象である。エビングハウスは忘却曲線を描き、学習後急速に忘却が進み次第に安定することを示した。主な説明理論として痕跡消衰説・干渉説（前向干渉・逆向干渉）・検索失敗説がある。符号化特異性原理では符号化時と検索時の文脈が一致することで想起が促進されるとされる重要な記憶概念である。"},
  25:{t:"成熟優位説はゲゼルが提唱した発達理論で、発達の速度・順序は環境や学習より遺伝的な成熟プログラムによって主に規定されるという立場である。双生児の階段のぼり訓練実験では早期訓練より成熟を待った方が効率的であることが示された。準備性（レディネス）の概念はこの理論から生まれた重要な教育的概念であり、発達支援の実践においても広く参照されている。"},
  26:{t:"ピアジェの認知発達論では子どもの思考は感覚運動期・前操作期・具体的操作期・形式的操作期の4段階を経て発達するとされる。前操作期の自己中心性、具体的操作期の保存概念の獲得と脱中心化、形式的操作期の仮説演繹的思考が各段階の特徴である。認知発達はスキーマへの同化と調節の相互作用を通じて進み、環境との能動的関わりを重視した理論である。"},
  27:{t:"フロイトの性発達段階論ではリビドー（性的エネルギー）の集中部位によって口唇期・肛門期・男根期・潜伏期・性器期の5段階が想定される。各段階で欲求が適切に満たされないと固着が生じ後の性格特性に影響するとされる。男根期にはエディプスコンプレックスが生じ、同性親への同一化を通じて超自我が形成されるとされる精神分析理論の重要な段階論である。"},
  28:{t:"エリクソンのライフサイクル理論は人生を8段階に分け各段階に心理社会的危機（対立する課題）を設定した。乳児期の基本的信頼対不信、青年期のアイデンティティ対役割拡散、老年期の統合性対絶望が代表的な危機である。各段階の課題克服によって徳が獲得されるとされ、フロイトの性発達段階論を社会・文化的側面まで拡張した発達理論として重要である。"},
  29:{t:"レジリエンスとは逆境・困難・トラウマ体験に直面した際に心理的に適応的に回復・成長する能力や過程のことである。保護因子（社会的支援の充実・自己効力感・問題解決能力・楽観性）と危険因子のバランスによって規定される。個人特性としての側面と環境との相互作用プロセスとしての側面があり、発達・臨床・産業領域でストレス予防と支援介入の理論的基盤として広く活用されている。"},
  30:{t:"ヴィゴツキーは内言を自己に向けた思考のための言語、外言を他者との伝達のための言語として区別した。子どもは外言→自己中心的言語→内言の順に発達し、内言は思考の道具として自己調整と関連する。最近接発達領域（ZPD）と足場かけ（スキャフォールディング）の概念と密接に関連し、社会文化的発達理論の核心をなす重要な発達心理学的概念である。"},
  31:{t:"愛着（アタッチメント）はボウルビィが提唱した概念で、乳幼児が特定の養育者に対して形成する情緒的絆であり安全基地として機能する。エインズワースのストレンジ・シチュエーション法で安定型・回避型・アンビバレント型・無秩序型の4分類が確立された。安定した愛着は探索行動・社会性・情動調整の基盤となり、内的作業モデルとして生涯の対人関係パターンに影響する。"},
  32:{t:"心の理論とは他者が自分と異なる信念・意図・感情を持つことを理解し心的状態を推論する能力である。ウィマーとペルナーが考案したサリー＆アン課題（誤信念課題）で測定され定型発達では4歳頃に獲得される。自閉スペクトラム症では発達が遅れることが多く、社会的コミュニケーション困難との関連が指摘されている。共同注意の発達とも密接に関連する重要な概念である。"},
  33:{t:"臨界期とは特定の学習・発達が生じやすい時期であり、この時期を逃すと同様の学習・発達が困難になるとされる。ローレンツが刻印づけ（インプリンティング）として動物で発見し、人間では言語獲得の臨界期が代表例である。現在は感受性期（sensitive period）という幅を持たせた概念も用いられ、早期介入や教育の時期に関わる重要な概念として臨床・教育の双方で参照されている。"},
  34:{t:"ピグマリオン効果はローゼンタールとジェイコブソンが実験的に示した現象で、教師が生徒に高い期待を持つことで実際に学業成績が向上する効果である。自己成就予言のメカニズムで説明され、教師の期待が言語的・非言語的コミュニケーションを通じて生徒の自己概念と動機づけに影響する。低い期待によりパフォーマンスが低下するゴーレム効果と対比される重要な教育心理学の概念である。"},
  35:{t:"帰属とは自己や他者の行動・出来事の原因を何に求めるかの認知過程で、ハイダーが創始した。内的帰属（能力・努力）か外的帰属（課題・運）かという次元が重要であり、状況要因を軽視して個人要因に過剰帰属する基本的帰属錯誤は代表的な社会的認知バイアスである。ケリーの共変モデルやワイナーの達成場面への帰属理論が重要な発展理論として知られている。"},
  36:{t:"認知的不協和理論はフェスティンガーが提唱した理論で、矛盾する二つの認知を同時に保持するときに不快な緊張（不協和）が生じ低減しようとする動機が働くというものである。不協和低減の方略として一方の認知の変更・新たな認知の付加・重要性の低下がある。説得抵抗・態度変容・自己正当化など多様な社会的行動の説明に用いられる社会心理学の古典的重要理論である。"},
  37:{t:"説得とは他者の態度・信念・行動を変えようとするコミュニケーション過程である。ペティとカシオッポのELM（精緻化見込みモデル）は中心ルート（論拠の質の吟味）と周辺ルート（話し手の魅力などの手がかり）の二経路で説得を説明する。関与度が高いときは中心ルートが優位で態度変容は持続しやすい。フット・イン・ザ・ドアなどの技法やリアクタンスとの関連も重要である。"},
  38:{t:"印象形成とは他者の特徴を手がかりにして全体的な印象を形成する認知過程である。アッシュの実験では「温かい」「冷たい」という中心的特性が印象全体に大きく影響することが示された。ハロー効果（一つの優れた特性が全体評価を高める）・初頭効果・確証バイアスなどが知られており、ステレオタイプや偏見の形成にも関連する対人認知の基礎的メカニズムとして重要である。"},
  39:{t:"葛藤（コンフリクト）とは互いに相容れない目標・欲求が同時に存在するときの心理的緊張状態である。レヴィンは接近－接近・回避－回避・接近－回避・二重接近－回避の四型に分類した。慢性的葛藤はストレスや精神的健康問題と関連し、防衛機制は葛藤から生じる不安への対処として機能するとフロイトの精神分析理論では位置づけられている重要な心理学的概念である。"},
  40:{t:"ジェームズ＝ランゲ説は感情の生起についてジェームズとランゲが独立に提唱した理論で、感情は身体的変化（心拍増加・筋収縮など）が生じた後にその知覚から生まれるとする。「悲しいから泣く」のではなく「泣くから悲しい」という逆説的主張が特徴である。キャノン＝バード説に批判されたが、感情における身体反応の役割を先駆的に強調した理論として感情研究の礎となっている。"},
  41:{t:"情動の二要因説はシャクターとシンガーが提唱した理論で、感情体験は生理的覚醒とその原因帰属（認知的ラベリング）の二要因によって決まるとする。アドレナリン注射実験で実証され、吊り橋実験での恋愛感情の生起も同様のメカニズムで説明される。感情の構成における認知的側面を強調した理論として感情心理学の重要理論であり、現代の感情の構成理論にも影響を与えている。"},
  42:{t:"内発的動機は活動自体から得られる楽しさ・興味・満足を原動力とする動機であり、外発的動機は報酬・評価などの外部要因による動機である。自己決定理論では自律性・有能感・関係性の三つの基本的心理欲求が内発的動機を支えるとされる。アンダーマイニング効果とは内発的動機のある活動に外的報酬を与えると内発的動機が低下する現象で、教育・職場設計において重要な知見となっている。"},
  43:{t:"欲求階層説はマズローが提唱した動機づけ理論で、人間の欲求を生理的欲求・安全欲求・愛情と所属の欲求・承認欲求・自己実現欲求の五段階ピラミッドとして整理したものである。下位の欲求が充足されて初めて上位の欲求が動機として機能するとされる。欠乏欲求と成長欲求の区別も重要であり、人本主義心理学の代表的理論として教育・経営・臨床の幅広い分野で応用されている。"},
  44:{t:"性格類型論とは個人を離散的なカテゴリーに分類してパーソナリティを理解する立場で、ユングの外向型・内向型（四機能との組み合わせで八類型）やクレッチマーの体型と気質の対応（細長型・肥満型・闘士型）が代表例である。シンプルでわかりやすい一方、中間型を適切に扱えない・測定の連続性が失われるなどの問題があり、現代心理学では特性論が主流となっている。"},
  45:{t:"性格特性論はパーソナリティを複数の連続的次元の組み合わせとして記述する立場である。アイゼンクの三次元モデル（外向性・神経症傾向・精神病傾向）とコスタ＆マクレーのビッグファイブ（外向性・神経症傾向・開放性・協調性・誠実性：OCEAN）が代表的である。測定の信頼性・妥当性が高く遺伝的基盤の検討も可能なため、現代の主流的立場として幅広い領域で活用されている。"},
  46:{t:"シナプスはニューロン間の情報伝達部位であり、活動電位が軸索終末に達すると神経伝達物質がシナプス間隙に放出され後シナプス膜の受容体に結合することで信号が伝達される。興奮性シナプス（グルタミン酸）と抑制性シナプス（GABA）のバランスが重要であり、ドーパミン・セロトニンなどの不均衡が精神疾患に関与し向精神薬の作用機序の基盤となっている。"},
  47:{t:"海馬は新しいエピソード記憶の形成・固定化と空間認知に関与し、損傷では新たな記憶を形成できない前向性健忘が生じる（H.M.症例が有名）。扁桃体は恐怖・不安などの情動処理と情動記憶の強化に関与し、恐怖条件づけには基底外側核が必須である。両者は相互連絡しており情動が記憶の符号化・固定化を強化するメカニズムの中核をなしている重要な脳構造である。"},
  48:{t:"失語症は大脳言語野の損傷による言語機能の障害である。ブローカ野損傷によるブローカ失語は非流暢性発話と比較的保たれた理解を特徴とし、ウェルニッケ野損傷によるウェルニッケ失語は流暢だが意味のない発話と理解障害を特徴とする。失語症のタイプは損傷部位の推定に役立ち、脳機能局在論を支持する重要な神経心理学的証拠として位置づけられている。"},
  49:{t:"闘争か逃走反応はキャノンが命名した概念で、脅威に直面したときに交感神経系が賦活されアドレナリン分泌・心拍増加・血圧上昇・筋肉への血流増加などが生じる生理的応答系である。急性ストレス反応として適応的だが現代社会では慢性的に活性化されやすく、高血圧・免疫機能低下・心疾患リスクと関連する。PTSDにおける過覚醒症状とも深く関連している概念である。"},
  50:{t:"ストレスはラザラスらの定義では環境からの要求が個人の適応資源を超えると認知されたときに生じる状態である。一次評価（脅威か？）と二次評価（対処可能か？）の二段階の認知的評価過程を経る。コーピングは問題焦点型と情動焦点型に分類され、社会的支援のストレス緩衝効果が認められており、HPA軸の慢性的過活動が身体疾患リスクを高めるメカニズムが解明されている。"},
  51:{t:"尺度水準は測定値の数学的性質によって名義・順序・間隔・比率尺度の四段階に分類する概念である。名義尺度はカテゴリー分類のみ、順序尺度は大小の順位のみ、間隔尺度は等間隔あり絶対0なし（温度・IQ）、比率尺度は絶対0あり（身長・反応時間）である。尺度水準によって適用できる統計手法が異なるため研究計画と分析において基本となる重要な知識体系である。"},
  52:{t:"標準化とは心理検査を代表性の高い標本に実施して得点分布を整理し個人の得点を集団内の位置として解釈可能にする手続きである。標準得点（T得点・偏差IQなど）により異なる検査間の比較が可能になる。信頼性・妥当性・実施手続きの均一化が必要であり、フリン効果（世代を超えてIQが上昇する現象）に対応するため定期的な再標準化も必要とされる。"},
  53:{t:"統計的仮説検定とは帰無仮説H₀（差がない・効果がないという仮説）を採択または棄却するための手続きであり、p値が有意水準α（通常0.05）より小さければH₀を棄却する。p値は効果の大きさを示すものではなく二値判断に過ぎない。効果量（コーエンのd・η²）や信頼区間との併用が推奨されており、統計的有意性のみへの批判から近年は効果量の報告が重視されている。"},
  54:{t:"第1種の誤り（α過誤）は真の帰無仮説を誤って棄却する誤りであり偽陽性とも呼ばれ、有意水準αがその確率の上限を設定する。第2種の誤り（β過誤）は偽の帰無仮説を誤って採択する誤りである。検定力（1-β）はH₀が偽のとき正しく棄却できる確率であり、サンプルサイズの増大・効果量の大きさで高まる。αを厳しく設定するとβが増大するトレードオフの関係が重要である。"},
  55:{t:"t検定は二群の平均値差を検定する手法で対応ありと対応なしの二種類がある。t値は平均差を標準誤差で除した値であり自由度に応じた臨界値と比較する。分散分析（ANOVA）は三群以上の平均値差を検定する手法でF値は群間分散を群内分散で除した値である。有意な場合はTukeyなどの多重比較法で具体的な群間差を特定する手続きが必要となる重要な統計手法である。"},
  56:{t:"主効果とは二要因以上の実験において各要因が従属変数に与える独立した効果である。交互作用とは要因Aの効果が要因Bの水準によって異なる現象であり、グラフでは折れ線の交差または非平行として現れる。交互作用が有意な場合は主効果の解釈に注意し各水準での単純主効果検定を実施する必要がある。実験計画法の核心をなす技術として心理学研究において重要な概念である。"},
  57:{t:"多変量解析は複数変数を同時に扱う統計手法の総称である。重回帰分析は複数の独立変数から従属変数を予測し標準偏回帰係数で各変数の独立した寄与を評価する。因子分析は観測変数の背後にある潜在因子を抽出する手法で探索的・確認的がある。構造方程式モデリング（SEM）は変数間の因果モデルを検証できる高度な手法として近年心理学研究で広く用いられている。"},
  58:{t:"知能の構造についてスピアマンは一般因子gと特殊因子sの二因子説を提唱し、サーストンは七つの基本的精神能力の多因子説を主張した。キャッテルは流動性知能と結晶性知能を区別し、現在はキャロルのCHC理論が標準とされている。フリン効果（世代間でIQが上昇する現象）も知られており、知能検査の結果は複数の指標として解釈することが推奨される重要な心理学的概念である。"},
  59:{t:"ビネー式知能検査はビネーとシモンが知的障害児の教育的選別のために開発した最初の知能検査であり、精神年齢（MA）を生活年齢（CA）で除して100倍した精神年齢IQを算出した。ターマンがスタンフォード大学で改訂し広く普及した。現在は偏差IQへ移行しているが、ウェクスラー式検査の礎となった歴史的重要性を持つ検査として心理学史上重要な位置を占めている。"},
  60:{t:"ウェクスラー式知能検査には成人用（WAIS）・児童用（WISC）・幼児用（WPPSI）があり、言語理解・知覚推理・ワーキングメモリ・処理速度の四指標と全検査IQを算出する。個人内の能力プロフィール分析が可能であり、学習障害・ASD・ADHDの評価や認知症スクリーニングに広く使用される。フリン効果への対応として定期的に改訂され現在WAIS-IV・WISC-Vが標準的に使用されている。"},
  61:{t:"臨床心理士は公益財団法人日本臨床心理士資格認定協会が認定する民間資格であり1988年に誕生した。指定大学院修了が主な取得要件で五年ごとの更新制度がある。保健医療・教育・司法・産業の四領域で心理的アセスメント・心理支援・関係者への助言・心の健康教育・研究調査を担う。公認心理師法施行（2017年）後も両資格を並行保有するケースが多い重要な心理専門職である。"},
  62:{t:"コンサルテーションとは専門家（コンサルタント）が他の専門家・支援者（コンサルティ）に助言を行うことで最終的にクライエントの支援を促進する間接支援の形態である。コンサルタント・コンサルティ・クライエントの三者モデルが基本構造であり、クライエントに直接関わるスーパービジョンとは区別される。スクールカウンセラーが教員に助言するケースが代表的な実践場面として知られている。"},
  63:{t:"スクールカウンセラー（SC）は学校に配置され児童生徒・保護者・教職員に対する心理的支援を行う専門家である。公認心理師や臨床心理士が担い週一回程度の非常勤配置が一般的である。個別カウンセリング・コンサルテーション・心理教育・危機介入などを担当し、SSW・特別支援コーディネーターなどと連携するチーム学校体制の中核として機能することが求められる専門職である。"},
  64:{t:"児童虐待とは保護者等が18歳未満の子どもに行う身体的・性的・心理的虐待およびネグレクトの総称である。発見した者には通告義務があり守秘義務より通告が優先される。虐待はアタッチメント障害・PTSDなど精神的影響を及ぼし認知・行動・発達全般に長期的影響を与える。公認心理師は関係機関と連携して早期発見・介入・心理支援を担う重要な専門的役割を持っている。"},
  65:{t:"スーパービジョンとは経験の少ない臨床家（スーパーバイジー）が経験豊富な指導者（スーパーバイザー）から定期的に指導・支援を受ける形式的な関係である。専門的技能の向上・倫理的実践の維持・バーンアウト予防が目的であり、逆転移への気づきや困難ケースへの対処も扱われる。公認心理師・臨床心理士にとって資格取得後も継続的なスーパービジョンを受けることが専門性維持に不可欠とされる。"},
  66:{t:"フロイトの局所論では心を意識・前意識・無意識の三層に分け、抑圧された記憶や欲動は無意識に留まり意識に上らないとした。構造論ではエス（快楽原則）・自我（現実原則）・超自我（道徳規範の内面化）の三構造に改訂された。局所論から構造論への改訂は無意識が単にエスだけでなく自我・超自我にも含まれることを認識したためであり、防衛機制・夢分析の理論的基盤となっている。"},
  67:{t:"エディプスコンプレックスはフロイト理論における男根期（3〜6歳）の発達的葛藤であり、男児は異性親への愛着と去勢不安から同性親への同一化を行い超自我を形成するとされる。この同一化を通じて道徳規範・性役割が内面化される。現代ではジェンダー的批判も多いが、精神分析理論の核心的概念として臨床・発達心理学の歴史上重要な位置を占めている基本的な理論概念である。"},
  68:{t:"防衛機制とは不安や心理的葛藤を軽減するために自我が無意識的に用いる心理的操作で、フロイトが概念化しアンナ・フロイトが体系化した。抑圧・投影・反動形成・合理化・昇華・退行・否認などが代表的な防衛機制として知られている。防衛機制の成熟度は精神的健康と関連しており、臨床評価においても重要な概念として広く用いられている基本的な精神分析的概念である。"},
  69:{t:"集合的無意識はユングが提唱した概念で、個人の経験を超えて全人類に共通して受け継がれる無意識の層のことである。その内容は元型（アーキタイプ）と呼ばれ、ペルソナ・シャドウ・アニマ・アニムス・自己などがある。元型は神話・夢・芸術に普遍的に現れ、ユング心理学（分析心理学）の核心的概念として人間の深層心理の理解においても広く用いられている重要な概念である。"},
  70:{t:"対象関係論はメラニー・クラインを中心に発展した精神分析の立場で、自我が内的に表象する対象（重要な他者）との関係が心理発達の核心であるとする。クラインはスプリッティングと投影同一視を重要な防衛機制として位置づけた。ウィニコットは「ほどよい母親」と移行対象の概念を提唱した。境界性パーソナリティ障害の理解と治療において現在も重要な理論的基盤となっている立場である。"},
  71:{t:"インテーク面接とは支援の最初に行われる初回面接であり、主訴・現病歴・生育歴・家族背景などを把握し支援の方向性を確認する場である。ラポールの形成が重要であり、守秘義務とその限界についてインフォームド・コンセントを行う。アセスメントと支援計画の立案のために必要な情報を構造的かつ関係性を損なわない形で収集することが求められる公認心理師の重要な実践場面である。"},
  72:{t:"アセスメントとは来談者の問題・状態・強みを多角的に評価し支援計画を立てるための情報収集と統合の過程である。面接・行動観察・心理検査の複数手法を組み合わせて実施する。得られた情報を統合してケースフォーミュレーション（問題の成立・維持機序の仮説）を作成し介入方針を決定する。治療のモニタリングと再評価も含む動的な過程であり公認心理師の中心的業務の一つである。"},
  73:{t:"質問紙法とは標準化された質問文への回答（自己報告）からパーソナリティ・精神症状・態度などを測定する心理検査の方法論である。MMPI・BDI・STAI・NEO-PI-Rなどが代表例である。大量データ収集が可能で採点が客観的である一方、社会的望ましさバイアスや回答の歪みという問題がある。信頼性・妥当性の確認された標準化検査を他の情報と統合して解釈することが重要とされる。"},
  74:{t:"投影法とは曖昧で多義的な刺激に対する反応からパーソナリティや無意識の心的状態を推測する心理検査の方法論である。ロールシャッハテスト・TAT・SCT・バウムテストなどが代表例である。無意識的ダイナミクスや防衛機制の把握に優れるとされるが、解釈の主観性・信頼性・妥当性への批判もある。高度な訓練と倫理的配慮が適切な使用のために不可欠とされる重要な検査法である。"},
  75:{t:"描画法とは絵を描くという非言語的行為を通じてパーソナリティや心理状態を評価する方法論である。HTP法・動的家族描画（KFD）・風景構成法などが主な技法である。言語化の困難な子どもや外傷体験を持つクライエントへの使用が特に有効とされる。描画の形式的側面（筆圧・サイズ・配置）と内容的側面の両方を分析し他の情報と統合して解釈することが重要な評価法である。"},
  76:{t:"作業検査法とは単純な作業を繰り返させたときの量・質・速度パターンからパーソナリティを評価する方法論である。内田クレペリン精神作業検査が代表的であり、1桁の数字の連続加算課題での仕事曲線（初頭努力・練習効果・疲労・慣れのパターン）を分析する。定型曲線からの逸脱がパーソナリティの特徴や精神的健康状態の指標となるとされ、採用選考や精神科評価に用いられる検査法である。"},
  77:{t:"病態水準はカーンバーグが提唱したパーソナリティ組織の重症度評価の枠組みで、神経症水準・境界性水準・精神病水準の三段階に分類する。自我境界の明確さ・現実検討能力・防衛機制の成熟度が評価基準となる。病態水準の評価は治療目標・頻度・技法の選択（支持的か探索的か）に直結する重要な臨床判断であり、精神分析的・力動的アプローチの中心的評価概念として位置づけられる。"},
  78:{t:"DSMはアメリカ精神医学会（APA）が発行する精神疾患の診断・統計マニュアルであり、DSM-5-TRが現在の最新版である。症状クラスターに基づくカテゴリー診断方式をとり操作的診断基準を明示する。DSM-5ではスペクトラム概念の導入・多軸診断廃止・「障害」から「症」への呼称変更などの改訂が行われた。WHOのICD-11との異同の理解も臨床実践において重要とされる診断分類体系である。"},
  79:{t:"統合失調症は妄想・幻覚などの陽性症状と感情鈍麻・意欲低下などの陰性症状を特徴とする精神疾患である。DSM-5では中核症状を含む6ヶ月以上の持続が診断基準となる。ドーパミン過活動仮説に基づき抗精神病薬が使用されるが陰性症状への効果は限定的である。再発率が高く長期的支援が必要であり、薬物療法とSST・心理教育・家族支援を組み合わせた包括的アプローチが推奨されている。"},
  80:{t:"うつ病は抑うつ気分・興味と喜びの喪失を中核症状とし、DSM-5では2週間以上9項目中5項目以上が該当するとき診断される。双極症はうつ状態と躁状態が交代する疾患でI型とII型に分類される。うつ病はSSRI・SNRIとCBTの組み合わせが標準治療であり、双極症では気分安定薬が主軸となり抗うつ薬単独使用は躁転リスクがあるため注意を要する重要な気分症群である。"},
  81:{t:"不安症群はパニック症・社交不安症・全般不安症・特定の恐怖症などを含み持続的で状況不相応な不安と回避行動を特徴とする。強迫症は強迫観念と強迫行為からなりDSM-5では独立した疾患群に分類された。両者ともCBT（特に曝露療法・反応妨害法）とSSRIの有効性が高い水準で実証されており、回避行動の維持が慢性化に寄与するため曝露が治療の中心となる重要な疾患群である。"},
  82:{t:"PTSDはトラウマ体験後に生じる精神疾患であり、DSM-5では再体験・回避・認知と気分の陰性変化・過覚醒の四クラスターが1ヶ月以上持続することが診断基準となる。神経生物学的には扁桃体の過活動と前頭前野による制御低下が関与する。EMDRと持続エクスポージャー療法が最も実証された心理的介入であり、複雑性PTSDはICD-11で独立した診断として新たに追加されている。"},
  83:{t:"身体症状症および関連症群はDSM-5のカテゴリーであり、苦痛を伴う身体症状と症状に関する過剰な思考・感情・行動を特徴とする身体症状症、重篤な疾患への過剰な恐怖を示す疾病不安症、神経学的症状を呈する変換症などが含まれる。旧来の身体化障害などの概念を整理したカテゴリーであり、心理教育・CBTおよび医療との連携が主要な介入となる。"},
  84:{t:"解離症とは意識・記憶・アイデンティティ・感覚が統合されない状態を指す疾患群であり、解離性同一症（DID）・解離性健忘・離人症などが含まれる。重篤なトラウマ（特に小児期の反復的虐待）との関連が強く、圧倒的体験から自己を守る防衛機制として生じると理解される。解離性健忘の回復を過度に促すと偽記憶のリスクがあるため慎重な対応が求められ、安全性確保と段階的処理が基本となる。"},
  85:{t:"摂食症は神経性やせ症・神経性過食症・過食性障害などを含む食行動の重大な障害の総称である。神経性やせ症は体重増加への強い恐怖と低体重を特徴とし身体合併症（低栄養・電解質異常）リスクが高い。神経性過食症は過食と代償行動（嘔吐・下剤乱用）の反復を特徴とする。ボディイメージの歪みや完璧主義・低自己評価が共通しておりCBT・家族療法・栄養管理の包括的アプローチが推奨される。"},
  86:{t:"パーソナリティ症とは内的体験と行動パターンが文化的期待から著しく偏逸し硬直化して長期にわたる苦痛や機能障害を生じる状態である。DSM-5ではA群（奇妙）・B群（感情的）・C群（不安）の三群に分類され全10類型がある。B群の境界性パーソナリティ症は自傷・感情不安定・対人関係問題を特徴とし弁証法的行動療法（DBT）が最も実証された治療法として知られる。"},
  87:{t:"自閉スペクトラム症（ASD）は社会的コミュニケーション・相互作用の持続的障害と制限された反復的行動パターンを特徴とする神経発達症である。DSM-5で従来の自閉症・アスペルガー症候群をスペクトラム概念に統合した。ABAによる行動的介入・TEACCHによる構造化支援・SSTが代表的支援方法であり、心の理論の発達遅延・実行機能の困難などが認知的特徴として挙げられる。"},
  88:{t:"限局性学習症（SLD）は知的発達に見合わない読み・書き・算数の特異的困難を特徴とする神経発達症である。注意欠如多動症（ADHD）は不注意・多動性・衝動性を特徴とし12歳以前からの症状が求められる。両者はしばしば合併し見逃されやすい。ADHDには薬物療法（メチルフェニデート等）と心理社会的介入の組み合わせが有効であり、個別支援計画に基づく合理的配慮が支援の核心となる。"},
  89:{t:"転移とは来談者が過去の重要な対象（親など）に向けていた感情・行動パターンをセラピストに向ける現象であり、精神分析療法の中心的治療素材である。逆転移はセラピスト側に生じる感情・反応であり現代では治療的情報として活用される。転移の分析を通じて無意識の関係パターンが意識化され修正的体験が促される。スーパービジョンで逆転移を扱うことがバーンアウト防止と倫理的実践維持に重要とされる。"},
  90:{t:"精神分析療法はフロイトが創始した心理療法であり、自由連想法・夢分析・転移解釈を通じて無意識の葛藤を意識化することで症状の緩和と人格変容を目指す長期的療法である。抵抗の分析・洞察の促進・作業貫徹（working through）の段階を経て変化が生じる。古典的形式から対面・週一回の精神分析的心理療法まで幅広い形式があり、短期力動的心理療法などの変法も発展している。"},
  91:{t:"行動療法は条件づけ理論に基づいて問題行動の変容を目指す心理療法であり、系統的脱感作・曝露法・トークンエコノミー・SST（社会生活技能訓練）などが代表的技法である。認知療法はベックとエリスが確立した療法で自動思考・スキーマ・認知の歪みを同定して修正することを目的とする。行動療法と認知療法は相補的であり現在は認知行動療法として統合されて実践されている。"},
  92:{t:"認知行動療法（CBT）は認知療法と行動療法を統合した構造化された短期心理療法であり、思考・行動・感情・身体感覚の相互作用に着目して問題の維持サイクルを断つことを目指す。自動思考の同定・認知再構成・行動実験・曝露などが主要技法である。うつ病・不安症・PTSDで最も実証的支持を受けており、マインドフルネスを取り入れたMBCT・ACT・DBTなど第三世代療法への発展も続いている。"},
  93:{t:"クライエント中心療法はロジャーズが創始した人本主義的心理療法であり、治療的変化に必要な条件として共感的理解・無条件の肯定的配慮・自己一致（真実性）の三条件を提唱した。治療者は評価・指示・解釈を行わず来談者の主体性・自己成長力（実現傾向）を信頼する非指示的アプローチである。この三条件はその後のすべての心理療法に共通する基本的治療要素として現在も広く認められている。"},
  94:{t:"フォーカシングはジェンドリンが開発した体験過程療法の技法であり、身体に感じられるが言語化しにくい体験の全体感（フェルトセンス）に注意を向け意味を引き出すことで洞察と変化を促す。言語以前の体験に身体感覚を通じてアクセスする点が特徴であり、体験を回避・切り離す傾向のあるクライエントに特に有効とされる。ロジャーズ理論から発展した体験過程療法の中心的技法である。"},
  95:{t:"交流分析（TA）はエリック・バーンが創始した心理療法であり、自我状態を親（P）・大人（A）・子ども（C）の三つに分けて対人交流パターンを分析する。ゲーム分析（不健全な交流パターン）・ストローク（承認の単位）・ライフスクリプト（人生脚本：幼少期に決定した人生設計図）の概念が重要である。自己理解と対人関係の改善を目指しグループ療法や教育・組織場面でも広く活用される。"},
  96:{t:"家族療法は家族を一つのシステムとして捉え、個人の問題を家族関係のダイナミクスの文脈で理解・介入する心理療法の立場である。ミニューチンの構造的家族療法・ヘイリーらの戦略的家族療法・ナラティブ家族療法などの流派がある。問題は個人内ではなく関係システムの中に存在するという円環的因果観が基本前提であり、子どもの問題行動・摂食症・統合失調症の家族支援に有効とされる。"},
  97:{t:"遊戯療法（プレイセラピー）は子どもが自由に遊ぶ過程を通じて心理的問題の解決と成長を促す心理療法であり、言語表現が未発達な子どもにとって遊びが自己表現・感情処理の自然な媒体となることを活かした治療法である。指示的遊戯療法と非指示的遊戯療法（アクスラインのロジャーズ原理）に大別され、虐待・トラウマ・発達上の問題を抱える子どもへの支援に広く活用されている。"},
  98:{t:"箱庭療法はカルフが開発しユング心理学を背景に、砂箱に小さな人形・自然物などを配置した作品を通じて内的世界を探索する心理療法である。日本では河合隼雄が導入した。言語化困難な体験や無意識的素材に非言語的・象徴的にアクセスできることが特徴であり、子どもだけでなく大人・外傷体験者にも有効とされる。治療者は自由で守られた空間を提供し変化を「見守る」姿勢が重視される。"},
  99:{t:"日本独自の心理療法として森田療法・内観療法・動作療法が代表的である。森田療法は不安を「あるがまま」に受け入れ目的本位の行動をとることで神経質症状の改善を目指す。内観療法は重要他者への「してもらったこと・して返したこと・迷惑をかけたこと」を集中的に振り返る技法である。動作療法（臨床動作法）は身体の動き・緊張の調整を通じて心理的問題に働きかける技法として国試でも頻出である。"},
  100:{t:"心理療法の効果研究における最高水準のデザインはランダム化比較試験（RCT）であり、無作為割り付けによって交絡変数を制御した上で治療群と対照群を比較する。複数のRCTをメタ分析で統合することで効果量を推定し実証的支持を受けた療法（ESTs）を特定する。EBP（根拠に基づく実践）の普及によりRCTで支持されたCBT・IPT等が各種治療ガイドラインで推奨されている重要な方法論である。"},
  101:{t:"公認心理師は公認心理師法（2017年施行）に基づく日本初の心理職国家資格であり、大学・大学院での指定科目修了が主要な取得経路となる。心理的アセスメント・心理的支援・関係者への助言・心の健康教育の四業務が規定されている。秘密保持義務（第41条）・信用失墜行為の禁止（第40条）・資質向上の責務（第43条）・主治医との連携義務（第42条）が法律に明記されている。"},
  102:{t:"科学者－実践者モデル（ボルダーモデル）とは1949年のボルダー会議で提唱された臨床心理士のトレーニングモデルであり、臨床実践は科学的根拠に基づき、同時に実践から科学的研究を生み出すという両輪の統合を示す。EBP（根拠に基づく実践）の理念的基盤であり、科学的知識・実践的知恵・自己省察を統合した専門職アイデンティティが公認心理師・臨床心理士に求められる基本的姿勢として位置づけられている。"},
  103:{t:"生物心理社会モデルはエンゲルが1977年に提唱した疾病モデルであり、健康・疾患を生物学的（遺伝・神経・免疫）・心理的（認知・感情・行動）・社会的（対人関係・環境・文化）の三側面の相互作用として理解する枠組みである。従来の生物医学モデルに対しホリスティックな視点を提供し、ICF（国際生活機能分類）の基底にある考え方として公認心理師の活動全般に影響する重要な概念である。"},
  104:{t:"信用失墜行為とは公認心理師としての信用を傷つけるような行為であり公認心理師法第40条で禁止されている。クライエントとの性的関係・多重関係・守秘義務違反・虚偽情報提供・不正請求などが該当する。違反した場合は登録取消しや名称使用停止の行政処分対象となりうる。法第41・42・43条とともに公認心理師の職業倫理の法的基盤をなす重要な規定として国家試験でも必須の知識である。"},
  105:{t:"秘密保持義務とは公認心理師法第41条に規定された義務であり、正当な理由なく業務上知り得た情報を他者に漏らしてはならないというものである。正当な理由として本人の同意・虐待通告義務・自傷他害防止のための危機介入・法律上の義務が挙げられる。守秘義務の内容と限界についてインフォームド・コンセント時に説明することが倫理的実践として求められる最も基本的な義務規定である。"},
  106:{t:"症状評価尺度とは精神症状の重症度・変化を定量的に評価するための標準化された測定ツールの総称である。ハミルトンうつ病評価尺度（HAM-D）・PANSSなどの他者評定式とBDI・PHQ-9などの自記式がある。治療効果の判定・研究転帰指標・臨床モニタリングに用いられ、他者評定式では評定者間信頼性の確保、自記式では回答バイアスへの留意がそれぞれ重要とされる評価ツールである。"},
  107:{t:"ICF（国際生活機能分類）はWHOが2001年に発表した障害と健康の分類モデルである。心身機能と構造・活動・参加の三次元と環境因子・個人因子の相互作用として生活機能を捉える。医学モデルと社会モデルを統合したものであり、障害を否定的側面だけでなく肯定的側面も評価できる点が特徴である。リハビリテーション・障害者支援・合理的配慮の計画立案における共通言語として広く活用されている。"},
  108:{t:"合理的配慮とは障害者が他の者と平等に権利・機会を享受できるよう過重な負担にならない範囲で必要な変更・調整を行うことである。障害者差別解消法により行政機関には義務、民間事業者は2024年改正施行から義務となった。学校では試験時間延長・別室受験、職場では業務内容調整などが具体例として挙げられる。本人との建設的対話を通じて具体的な配慮内容を決定することが原則とされている。"},
  109:{t:"行動変容ステージモデル（汎理論的モデル）はプロチャスカとディクレメンテが提唱したモデルで、行動変容を無関心期・関心期・準備期・実行期・維持期の五段階として記述する。各ステージにはそれぞれ適した介入方略が存在し無関心期には意識啓発、実行期以降には行動計画と強化が有効とされる。禁煙・運動・ダイエットなどの健康行動変容に広く応用されている重要なモデルである。"},
  110:{t:"依存症とはアルコール・薬物などの物質やギャンブル・ゲームへの強迫的使用・行動であり、コントロールの喪失・害があっても使用継続・禁断症状を特徴とする。DSM-5では物質使用症とギャンブル症に分類される。動機づけ面接・認知行動療法・12ステッププログラム・CRAFT（家族支援プログラム）が主要な介入方法であり、回復には長期的な環境調整と社会的支援が不可欠とされる重要な疾患概念である。"},
  111:{t:"自殺のリスクアセスメントとは自殺念慮・計画・手段入手の有無と危険因子・保護因子のバランスを総合的に評価し適切な介入水準を判断するプロセスである。危険因子として過去の企図歴・精神疾患・絶望感・孤立が重要であり、保護因子として社会的支援・来談意欲・将来への希望が挙げられる。直接的な自殺の問いかけと安全計画の共同作成が有効な介入として推奨されている基本的な実践技術である。"},
  112:{t:"補償を伴う選択的最適化（SOCモデル）はバルテスらが提唱した老年期の適応モデルであり、選択（重要な目標を絞り込む）・最適化（資源を集中する）・補償（失われた手段の代替を用いる）の三方略からなる。ピアニストが加齢で難曲を減らし（選択）練習を増やし（最適化）速度差で対比を作る（補償）例が有名である。サクセスフルエイジング研究の中心的理論として広く位置づけられている。"},
  113:{t:"認知症とは記憶・見当識・判断力・遂行機能などが慢性・進行性に低下し日常生活に支障をきたす疾患群の総称である。アルツハイマー型・脳血管性・レビー小体型・前頭側頭型が主要な原因疾患である。BPSDは本人・介護者双方に大きな負担をもたらし、軽度認知障害（MCI）は早期介入の対象となる。心理支援では回想法・認知刺激療法・家族介護者支援が重要な役割を担う。"},
  114:{t:"チーム学校は文部科学省が2015年に提唱した理念であり、校長のリーダーシップのもとで教員・SC・SSW・特別支援コーディネーターなどが協働する学校運営体制である。いじめ・不登校・虐待・発達障害への複雑な対応に対して多職種連携による包括的支援を実現することを目的とする。SCは心理の専門家として個別カウンセリング・コンサルテーション・チームへの心理的視点の提供を担う。"},
  115:{t:"少年法は20歳未満の少年（非行少年）を対象とし成人刑事手続きとは異なる保護主義的な処遇を規定した法律である。家庭裁判所が中心機関となり家裁調査官による調査・少年審判・保護処分が基本的な流れとなる。2022年改正で18・19歳は「特定少年」として一部異なる扱いとなった。公認心理師は司法機関での心理的アセスメントや処遇支援において重要な専門的役割を担っている。"},
  116:{t:"司法面接とは被害を受けた子どもや脆弱な証人から、二次被害を防ぎながら正確で信頼性の高い情報を得るために開発された専門的面接技法である。NICHDプロトコルが国際標準として普及しており、ラポール形成・開放型質問の活用・誘導回避が基本原則である。日本では法務省・警察庁・厚生労働省による協同面接として普及が進んでおり、公認心理師に求められる重要な専門技術である。"},
  117:{t:"ストレスチェック制度は労働安全衛生法改正（2014年）により2015年から施行された制度であり、常時50名以上の従業員を雇用する事業場で年1回の実施が義務づけられている。仕事のストレス要因・心身のストレス反応・周囲のサポートを測定し高ストレス者には医師による面接指導が申し出られる。制度の目的は一次予防（ストレスへの気づきと職場環境改善）であり公認心理師が実施者として関与できる制度である。"},
  118:{t:"ワーク・エンゲイジメントはシャウフェリらが提唱した概念で、仕事に対する活力・熱意・没頭の三要素から成る持続的で肯定的な充実状態である。バーンアウトの対極概念として位置づけられUWESで測定される。JD-Rモデルでは職務資源（裁量権・上司の支援等）と個人資源（自己効力感等）がエンゲイジメントを高めるとされ、組織の生産性・健康経営・メンタルヘルス対策において重要な産業心理学的概念である。"},
  119:{t:"向精神薬とは中枢神経系に作用して精神症状や行動に影響を与える薬物の総称であり、抗精神病薬・抗うつ薬・気分安定薬・抗不安薬・睡眠薬・精神刺激薬に大別される。抗精神病薬の副作用として錐体外路症状がある。SSRIでは賦活症候群・性機能障害が問題となる。リチウムは有効血中濃度域が狭く中毒に注意が必要である。公認心理師には多職種連携において向精神薬の種類・作用・副作用の知識が不可欠である。"},
  120:{t:"関係行政論とは公認心理師が活動する保健医療・福祉・教育・司法産業の四領域における関連法律・制度・機関に関する知識の体系である。医療領域では精神保健福祉法・医療法、福祉領域では児童福祉法・障害者総合支援法、教育領域では学校教育法・いじめ防止対策推進法、司法領域では少年法・更生保護法が主要な関連法規である。各機関（精神保健福祉センター・児童相談所等）の機能理解も求められる。"}
};

// ========== 状態 ==========
let deck=[], currentIdx=0, answered=false;
let scores = JSON.parse(localStorage.getItem('psych120_scores')||'{}');
let answers = JSON.parse(localStorage.getItem('psych120_answers')||'{}');
let sessionResults = {perfect:0,good:0,half:0,miss:0};

const MIN_CHARS = 160, MAX_CHARS = 200;


function updateCharCount(){
  const len = document.getElementById('userAnswer').value.replace(/\n/g,'').length;
  const numEl   = document.getElementById('charNum');
  const barEl   = document.getElementById('charBar');
  const hintEl  = document.getElementById('charHint');

  numEl.textContent = len;

  let cls, barColor, barWidth, hint;
  if(len < MIN_CHARS){
    cls = 'under';
    barColor = '#a0aec0';
    barWidth = Math.round((len / MIN_CHARS) * 70); // 0〜70%
    hint = `あと ${MIN_CHARS - len} 字`;
  } else if(len <= MAX_CHARS){
    cls = 'ok';
    barColor = '#48bb78';
    // 160字=70%、200字=100%
    barWidth = 70 + Math.round(((len - MIN_CHARS) / (MAX_CHARS - MIN_CHARS)) * 30);
    hint = `✓ ${len} 字 — 範囲内です！`;
  } else {
    cls = 'over';
    barColor = '#e53e3e';
    barWidth = 100;
    hint = `${len - MAX_CHARS} 字オーバー`;
  }

  numEl.className  = `char-count-num ${cls}`;
  hintEl.className = `char-count-hint ${cls}`;
  hintEl.textContent = hint;
  barEl.style.width      = barWidth + '%';
  barEl.style.background = barColor;
}

function init(){
  const chs=[...new Set(WORDS.map(w=>w.ch))];
  const sel=document.getElementById('filterChapter');
  chs.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  updateStats(); startQuiz();
}

function getFiltered(){
  const ch=document.getElementById('filterChapter').value;
  return WORDS.filter(w=>(ch==='all'||w.ch===ch));
}

function startQuiz(){
  const order=document.getElementById('filterOrder').value;
  let filtered=getFiltered();
  if(order==='shuffle') filtered=[...filtered].sort(()=>Math.random()-0.5);
  else if(order==='miss'){
    const rank={miss:0,half:1,'':2,good:3,perfect:4};
    filtered=[...filtered].sort((a,b)=>(rank[scores[a.no]||'']??2)-(rank[scores[b.no]||'']??2));
  }
  deck=filtered; currentIdx=0;
  sessionResults={perfect:0,good:0,half:0,miss:0};
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('mainArea').style.display='';
  switchTab('quiz'); showCard();
}

function showCard(){
  if(currentIdx>=deck.length){showComplete();return;}
  const w=deck[currentIdx]; answered=false;
  document.getElementById('cardNo').textContent=`No.${w.no}  ${currentIdx+1}/${deck.length}`;
  document.getElementById('cardChapter').textContent=w.ch;
  document.getElementById('cardArea').textContent=w.area;
  document.getElementById('cardTerm').textContent=w.term;
  const ta=document.getElementById('userAnswer');
  ta.value=''; ta.disabled=false;
  updateCharCount();
  document.getElementById('prevAnswer').classList.remove('show');
  document.getElementById('modelAnswer').classList.remove('show');
  document.getElementById('judgeSection').classList.remove('show');
  document.getElementById('btnCheck').disabled=false;
  document.getElementById('btnCheck').textContent='答えを見る・採点する';
  ['j-perfect','j-good','j-half','j-miss'].forEach(id=>document.getElementById(id).classList.remove('selected'));
  document.getElementById('btnNext').disabled=true;
  document.getElementById('btnPrev').disabled=currentIdx===0;
  updateProgress(); updateStats();
}

function showAnswer(){
  if(answered)return; answered=true;
  const w=deck[currentIdx];
  const d=DESC[w.no]||{m:w.term,s:''};
  const userText = document.getElementById('userAnswer').value.trim();

  document.getElementById('userAnswer').disabled=true;
  document.getElementById('btnCheck').disabled=true;
  document.getElementById('btnCheck').textContent='採点中…';

  // 前回の回答を表示（今回の回答を保存する前に取得）
  const prevTxt = answers[w.no];
  if(prevTxt){
    document.getElementById('prevAnswerText').textContent = prevTxt;
    document.getElementById('prevAnswer').classList.add('show');
  }

  // 今回の回答テキストを保存
  if(userText.length > 0){
    answers[w.no] = userText;
    localStorage.setItem('psych120_answers', JSON.stringify(answers));
  }

  // 模範解答を表示
  document.getElementById('modelMain').textContent=d.t||d.m;
  document.getElementById('modelAnswer').classList.add('show');

  // 自己採点
  document.getElementById('judgeSection').classList.add('show');
  document.getElementById('judgeLabel').textContent = userText.length===0
    ? '（未記述）理解度を選択してください：'
    : '自己採点してください：';
  document.getElementById('btnCheck').textContent='採点済み';
}

function judge(result){
  const w=deck[currentIdx];
  const prev = scores[w.no];
  if(prev && prev !== result) sessionResults[prev] = Math.max(0,(sessionResults[prev]||0)-1);
  sessionResults[result]=(sessionResults[result]||0)+1;
  scores[w.no]=result;
  localStorage.setItem('psych120_scores',JSON.stringify(scores));
  ['perfect','good','half','miss'].forEach(r=>document.getElementById('j-'+r).classList.toggle('selected',r===result));
  document.getElementById('btnNext').disabled=false;
  updateStats();
}

function nextCard(){currentIdx++;showCard();}
function prevCard(){if(currentIdx>0){currentIdx--;showCard();}}
function skipCard(){currentIdx++;showCard();}

function updateProgress(){
  const pct=deck.length>0?Math.round((currentIdx/deck.length)*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${currentIdx} / ${deck.length}`;
}

function updateStats(){
  const ids=getFiltered().map(w=>w.no);
  let p=0,g=0,h=0,m=0;
  ids.forEach(id=>{const s=scores[id];if(s==='perfect')p++;else if(s==='good')g++;else if(s==='half')h++;else if(s==='miss')m++;});
  document.getElementById('stTotal').textContent=ids.length;
  document.getElementById('stPerfect').textContent=p;
  document.getElementById('stGood').textContent=g;
  document.getElementById('stHalf').textContent=h;
  document.getElementById('stMiss').textContent=m;
}

function resetScores(){
  if(!confirm('すべての学習進捗をリセットしますか？'))return;
  scores={};answers={};
  localStorage.removeItem('psych120_scores');
  localStorage.removeItem('psych120_answers');
  updateStats();startQuiz();
}

function showComplete(){
  document.getElementById('mainArea').style.display='none';
  const s=sessionResults,total=s.perfect+s.good+s.half+s.miss;
  document.getElementById('completeSubText').textContent=`${total}問回答 ｜ 完璧: ${s.perfect}  理解OK: ${s.good}  半分: ${s.half}  未習得: ${s.miss}`;
  document.getElementById('resultGrid').innerHTML=`
    <div class="result-item" style="background:#c6f6d5;color:#276749"><div class="count">${s.perfect}</div><div class="name">◎ 完璧</div></div>
    <div class="result-item" style="background:#bee3f8;color:#2a69ac"><div class="count">${s.good}</div><div class="name">○ 理解OK</div></div>
    <div class="result-item" style="background:#fefcbf;color:#975a16"><div class="count">${s.half}</div><div class="name">△ 半分</div></div>
    <div class="result-item" style="background:#fed7d7;color:#9b2c2c"><div class="count">${s.miss}</div><div class="name">✗ 未習得</div></div>`;
  document.getElementById('completeScreen').classList.add('active');
  updateProgress();
}

function switchTab(tab){
  document.getElementById('tabQuiz').classList.toggle('active',tab==='quiz');
  document.getElementById('tabList').classList.toggle('active',tab==='list');
  document.getElementById('quizView').style.display=tab==='quiz'?'':'none';
  document.getElementById('listView').style.display=tab==='list'?'block':'none';
  if(tab==='list')renderList();
}

function renderList(){
  const filtered=getFiltered();
  const sl={perfect:'◎ 完璧',good:'○ 理解OK',half:'△ 半分',miss:'✗ 未習得'};
  const sc={perfect:'sc-perfect',good:'sc-good',half:'sc-half',miss:'sc-miss'};
  document.getElementById('listBody').innerHTML=filtered.map(w=>{
    const s=scores[w.no];
    const chip=s?`<span class="score-chip ${sc[s]}">${sl[s]}</span>`:`<span class="score-chip sc-none">未回答</span>`;
    return `<tr><td>${w.no}</td><td><span class="ch-tag">${w.ch}</span></td><td>${w.term}</td><td>${chip}</td></tr>`;
  }).join('');
}

init();
</script>
